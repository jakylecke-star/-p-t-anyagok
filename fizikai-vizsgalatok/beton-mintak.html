<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Beton Mintafeladat</title>
    <style>
        body { font-family: sans-serif; padding: 30px; background: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 10px; border-left: 10px solid #27ae60; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .math { font-style: italic; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Kidolgozott Példa: Tömörödési mérték</h2>
        <p><b>Feladat:</b> Egy mérésnél a süllyedés s = 50 mm, a tartály magassága h = 400 mm.</p>
        <p><b>Számítás:</b><br>
        c = 400 / (400 - 50)<br>
        c = 400 / 350 = <span class="math">1,14</span></p>
        <p><b>Értékelés:</b> A 1,14-es érték a táblázat alapján a <b>C2</b> osztályba tartozik (képlékeny).</p>
    </div>
</body>
</html>
