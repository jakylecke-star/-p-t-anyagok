<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Nedvesség minták</title>
    <style>
        :root { --primary: #2c3e50; --accent: #9b59b6; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 700px; width: 100%; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: block; margin-bottom: 20px; }
        .example { background: #f9f9f9; border-left: 5px solid var(--accent); padding: 20px; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h2>Nedvességi mintafeladatok</h2>
    <div class="example">
        <h4>1. feladat: Porotherm elem</h4>
        <p>Nedves (mn): 19,853 kg | Száraz (msz): 19,153 kg</p>
        <strong>Víztartalom (w):</strong> ((19.853 - 19.153) / 19.153) * 100 = <b>3,655%</b>
    </div>
</div>

</html>
