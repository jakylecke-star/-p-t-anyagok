<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Sűrűség Gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { color: var(--primary); margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .check-btn { background: var(--primary); color: white; }
        .sol-btn { background: #95a5a6; color: white; display: none; }
        
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; line-height: 1.5; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <a href="../index.html" class="back-link">← Vissza</a>
    <h2>Sűrűség számítása</h2>
    <p id="task-text">Töltés...</p>

    <div class="input-group">
        <label>Eredmény (g/cm³):</label>
        <input type="number" id="userAns" step="0.01" placeholder="Írd ide a számolt értéket">
    </div>

    <div class="button-group">
        <button onclick="checkAnswer()" class="check-btn">Ellenőrzés</button>
        <button onclick="showSolution()" id="solBtn" class="sol-btn">Megoldás megmutatása</button>
    </div>

    <div id="feedback">
        <div id="status-text"></div>
        <div id="solution-text" style="display:none; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); pt: 10px; font-weight: bold;"></div>
    </div>
</div>

<script>
    let m, V, correctAns;

    function generateTask() {
        m = (Math.random() * 100 + 50).toFixed(1); // 50-150g
        V = (Math.random() * 30 + 20).toFixed(1);  // 20-50cm3
        correctAns = (m / V).toFixed(2);
        document.getElementById('task-text').innerHTML = `Egy minta tömege <b>${m} g</b>, térfogata <b>${V} cm³</b>. Mekkora a sűrűsége?`;
        
        // Reset felület
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('solBtn').style.display = 'none';
        document.getElementById('userAns').value = '';
    }

    function checkAnswer() {
        const userVal = document.getElementById('userAns').value;
        const feedback = document.getElementById('feedback');
        const status = document.getElementById('status-text');
        const solBtn = document.getElementById('solBtn');
        const solText = document.getElementById('solution-text');

        feedback.style.display = 'block';
        solText.style.display = 'none';

        if (Math.abs(userVal - correctAns) < 0.05) {
            feedback.style.backgroundColor = '#d4edda';
            feedback.style.color = '#155724';
            status.innerHTML = "✅ <b>Helyes megoldás!</b> Ügyes vagy.";
            solBtn.style.display = 'none';
        } else {
            feedback.style.backgroundColor = '#f8d7da';
            feedback.style.color = '#721c24';
            status.innerHTML = "❌ <b>Sajnos nem jó.</b> Ellenőrizd a számítást!";
            solBtn.style.display = 'inline-block';
            solText.innerHTML = `Helyes képlet: ρ = m / V <br> Számítás: ${m} / ${V} = ${correctAns} g/cm³`;
        }
    }

    function showSolution() {
        document.getElementById('solution-text').style.display = 'block';
    }

    generateTask();
</script>

</body>
</html>
