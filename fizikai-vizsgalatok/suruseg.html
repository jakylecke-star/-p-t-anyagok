<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sűrűség és porozitás gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .stat-box { background: var(--primary); color: white; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.9em; text-align: center; }
        .task-card { background: #f8f9fa; border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 20px; line-height: 1.6; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <div class="stat-box">Saját eredményed: <span id="score">0</span> sikeres feladat</div>
    <h2>Sűrűség és porozitás</h2>
    <div class="task-card"><p id="task-text">Adatok betöltése...</p></div>
    <label>Testsűrűség (ρ<sub>t</sub>) [g/cm³]:</label>
    <input type="number" id="rho_t_input" step="0.001">
    <label>Testtömörség (T<sub>t</sub>) [tizedes]:</label>
    <input type="number" id="tt_input" step="0.01">
    <button onclick="checkAnswers()">Ellenőrzés és mentés</button>
    <div id="feedback" class="feedback"></div>
    <button id="next-btn" style="display:none; background: var(--accent);" onclick="location.reload()">Új feladat generálása ↻</button>
</div>
<script>
    let currentScore = localStorage.getItem('constructionScore') || 0;
    document.getElementById('score').innerText = currentScore;
    let m = (Math.random() * (3100 - 2800) + 2800).toFixed(1);
    let Vt = (Math.random() * (1850 - 1700) + 1700).toFixed(1);
    let rho = 1800; 
    let correct_rho_t = (m / Vt).toFixed(3);
    let correct_tt = (correct_rho_t / (rho/1000)).toFixed(2);
    document.getElementById('task-text').innerHTML = `<b>Mérési adatok:</b><br>Tömeg (m): ${m} g<br>Térfogat (V<sub>t</sub>): ${Vt} cm³<br>Anyagsűrűség (ρ): ${rho} kg/m³`;
    function checkAnswers() {
        let userRho = document.getElementById('rho_t_input').value;
        let userTt = document.getElementById('tt_input').value;
        let fb = document.getElementById('feedback');
        if (Math.abs(userRho - correct_rho_t) < 0.01 && Math.abs(userTt - correct_tt) < 0.02) {
            fb.style.display = "block"; fb.style.background = "#d4edda"; fb.style.color = "#155724"; fb.innerHTML = "✅ Helyes!";
            currentScore++; localStorage.setItem('constructionScore', currentScore);
            document.getElementById('score').innerText = currentScore;
            document.getElementById('next-btn').style.display = "block";
        } else {
            fb.style.display = "block"; fb.style.background = "#f8d7da"; fb.style.color = "#721c24";
            fb.innerHTML = `❌ Hiba! Helyes: ρt ≈ ${correct_rho_t}, Tt ≈ ${correct_tt}`;
        }
    }
</script>
</body>
</html>
