<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Mechanika Gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { color: var(--primary); margin-top: 0; }
        .task-box { background: #fff5f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #e74c3c; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        
        .button-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .check-btn { background: var(--primary); color: white; }
        .sol-btn { background: #95a5a6; color: white; display: none; }
        
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <a href="../index.html" class="back-link">← Vissza</a>
    <h2>Nyomószilárdság számítása</h2>
    <div class="task-box" id="task-text">Töltés...</div>

    <div class="input-group">
        <label>Nyomószilárdság (N/mm² vagy MPa):</label>
        <input type="number" id="userAns" step="0.1" placeholder="Add meg az eredményt">
    </div>

    <div class="button-group">
        <button onclick="checkAnswer()" class="check-btn">Ellenőrzés</button>
        <button onclick="showSolution()" id="solBtn" class="sol-btn">Megoldás megmutatása</button>
    </div>

    <div id="feedback">
        <div id="status-text"></div>
        <div id="solution-text" style="display:none; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; font-weight: bold;"></div>
    </div>
</div>

<script>
    let force, edge, area, correctAns;

    function generateTask() {
        // Véletlenszerű adatok: 150x150 mm-es kocka vagy 40x40 mm-es próbatest
        const isSmall = Math.random() > 0.5;
        edge = isSmall ? 40 : 150; 
        area = edge * edge;
        
        // Erő kN-ban (kisebb próbatestnél kisebb erő)
        force = isSmall ? (Math.random() * 50 + 20).toFixed(1) : (Math.random() * 500 + 400).toFixed(1);
        
        // Számítás: f = F / A (kN -> N átszámítással: * 1000)
        correctAns = ((force * 1000) / area).toFixed(1);
        
        document.getElementById('task-text').innerHTML = 
            `Egy <b>${edge}x${edge} mm</b> alapú kocka próbatest a vizsgálat során <b>${force} kN</b> erő hatására tört össze. <br><br> Számítsd ki a nyomószilárdságot!`;
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('solBtn').style.display = 'none';
        document.getElementById('userAns').value = '';
    }

    function checkAnswer() {
        const userVal = document.getElementById('userAns').value;
        const feedback = document.getElementById('feedback');
        const status = document.getElementById('status-text');
        const solBtn = document.getElementById('solBtn');
        const solText = document.getElementById('solution-text');

        feedback.style.display = 'block';
        solText.style.display = 'none';

        if (Math.abs(userVal - correctAns) <= 0.2) {
            feedback.style.backgroundColor = '#d4edda';
            feedback.style.color = '#155724';
            status.innerHTML = "✅ <b>Helyes!</b> A szilárdság értéke pontos.";
            solBtn.style.display = 'none';
        } else {
            feedback.style.backgroundColor = '#f8d7da';
            feedback.style.color = '#721c24';
            status.innerHTML = "❌ <b>Hibás számítás.</b> Ne felejtsd el az erőt Newtonba (N) átszámítani!";
            solBtn.style.display = 'inline-block';
            solText.innerHTML = `Képlet: f<sub>c</sub> = F / A <br>
                                Felület (A): ${edge} · ${edge} = ${area} mm² <br>
                                Erő (F): ${force} kN = ${force * 1000} N <br>
                                Számítás: ${force * 1000} / ${area} = ${correctAns} N/mm²`;
        }
    }

    function showSolution() {
        document.getElementById('solution-text').style.display = 'block';
    }

    generateTask();
</script>

</body>
</html>
