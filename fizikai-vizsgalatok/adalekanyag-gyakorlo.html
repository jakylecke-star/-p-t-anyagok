<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Adalékanyag Gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: block; margin-bottom: 20px; }
        .task-card { background: #f8f9fa; border-left: 5px solid var(--accent); padding: 20px; border-radius: 10px; margin-bottom: 20px; line-height: 1.6; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .hint { margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h2 id="q-title">Feladat generálása...</h2>
    <div id="q-text" class="task-card"></div>
    <input type="number" id="userAns" step="0.01" placeholder="Írd ide a számolt értéket">
    <button onclick="check()">Ellenőrzés</button>
    <p class="hint">Tipp: A kerekítésnél két tizedesjegyet használj!</p>
</div>

<script>
    let correct, mode;

    function generate() {
        const r = Math.random();
        if (r < 0.4) { // Agyag-iszap
            mode = "iszap";
            let v1 = Math.floor(Math.random() * 25) + 10;
            let v2 = Math.floor(Math.random() * 100) + 450;
            correct = (v1 / v2 * 100).toFixed(2);
            document.getElementById('q-title').innerText = "Agyag-iszap tartalom";
            document.getElementById('q-text').innerHTML = `Egy mérőhengerben az adalékanyag térfogata <b>${v2} cm³</b>, az ülepedett iszapréteg <b>${v1} cm³</b>. <br>Számítsa ki az <b>i</b> értéket %-ban!`;
        } else if (r < 0.7) { // Fennmaradt %
            mode = "szita1";
            let ossz = 1000;
            let fenm = Math.floor(Math.random() * 150) + 50;
            correct = (fenm / ossz * 100).toFixed(2);
            document.getElementById('q-title').innerText = "Szitavizsgálat - Fennmaradt %";
            document.getElementById('q-text').innerHTML = `A minta össztömege ${ossz} g. Egy adott szitán fennmaradt <b>${fenm} g</b> anyag. <br>Számítsa ki a <b>Fennmaradt %</b>-ot!`;
        } else { // Áthullott %
            mode = "szita2";
            let osszFenm = Math.floor(Math.random() * 30) + 10;
            correct = (100 - osszFenm).toFixed(2);
            document.getElementById('q-title').innerText = "Szitavizsgálat - Áthullott %";
            document.getElementById('q-text').innerHTML = `Egy adott szitán az <b>összes fennmaradt</b> anyag aránya <b>${osszFenm}%</b>. <br>Számítsa ki az <b>Összes áthullott %</b>-ot!`;
        }
    }

    function check() {
        let val = document.getElementById('userAns').value;
        if (Math.abs(val - correct) < 0.1) {
            alert("✅ Helyes! Megoldás: " + correct);
            location.reload();
        } else {
            alert("❌ Hibás válasz! A helyes (vastagon szedett) érték: " + correct);
        }
    }
    generate();
</script>
</body>
</html>
