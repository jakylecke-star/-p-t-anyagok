<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Komplex Szemmegoszlás Vizsgálat</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 900px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: block; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; font-size: 0.85em; }
        
        input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        input.error { border: 2px solid #e74c3c; background: #fdf2f2; }
        input.success { border: 2px solid #27ae60; background: #f2f9f2; }
        
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-check { background: var(--accent); color: white; flex: 2; }
        .btn-new { background: #3498db; color: white; flex: 1; }
        
        .info-box { background: #eef7ee; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h2>Komplex Szemmegoszlási Vizsgálat</h2>
    
    <div class="info-box">
        <b>Feladat:</b> Egészítse ki a jegyzőkönyvet! A számításokat két tizedesjegy pontossággal végezze. 
        <br>Össztömeg (m): <b id="total-mass">...</b> g
    </div>

    <table id="sieve-table">
        <thead>
            <tr>
                <th>Szita (mm)</th>
                <th>Fennmaradt (g)</th>
                <th>Fennmaradt (%)</th>
                <th>Összes fennm. (%)</th>
                <th>Összes áthullott (%)</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <div class="controls">
        <button class="btn-check" onclick="checkAll()">Ellenőrzés</button>
        <button class="btn-new" onclick="location.reload()">Új feladat generálása</button>
    </div>
</div>

<script>
    const sieveSizes = [24, 16, 8, 4, 2, 1, 0.5, 0.25, 0.063];
    let data = [];
    let totalMass = 0;

    function init() {
        // Véletlenszerű tömegek generálása
        data = sieveSizes.map((size, index) => {
            let m = index === 0 ? 0 : Math.floor(Math.random() * 100) + 20;
            return { size, mass: m };
        });
        
        // Tál hozzáadása
        data.push({ size: 'tál', mass: Math.floor(Math.random() * 20) + 5 });
        
        totalMass = data.reduce((sum, item) => sum + item.mass, 0);
        document.getElementById('total-mass').innerText = totalMass;

        const tbody = document.getElementById('table-body');
        let cumulativeFennm = 0;

        data.forEach((item, index) => {
            let fenmSzazalek = (item.mass / totalMass * 100);
            cumulativeFennm += fenmSzazalek;
            let athullottSzazalek = 100 - cumulativeFennm;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.size}</td>
                <td><b>${item.mass}</b></td>
                <td><input type="number" step="0.01" class="ans-f" data-val="${fenmSzazalek.toFixed(2)}"></td>
                <td><input type="number" step="0.01" class="ans-of" data-val="${cumulativeFennm.toFixed(2)}"></td>
                <td><input type="number" step="0.01" class="ans-a" data-val="${athullottSzazalek.toFixed(2)}"></td>
            `;
            tbody.appendChild(row);
        });
    }

    function checkAll() {
        const inputs = document.querySelectorAll('input');
        let score = 0;
        
        inputs.forEach(input => {
            let userVal = parseFloat(input.value);
            let correctVal = parseFloat(input.getAttribute('data-val'));
            
            if (Math.abs(userVal - correctVal) < 0.05) {
                input.className = 'success';
                score++;
            } else {
                input.className = 'error';
            }
        });

        if(score === inputs.length) {
            alert("Gratulálok! Minden érték pontos.");
        } else {
            alert("Vannak még hibás adatok. A piros mezőket ellenőrizd újra!");
        }
    }

    init();
</script>

</body>
</html>
