<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Adalékanyag Gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        h2 { color: var(--primary); margin-top: 0; }
        .task-box { background: #fffde7; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #fbc02d; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f8f9fa; font-size: 0.9em; }
        
        .input-group { margin-bottom: 15px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .button-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .check-btn { background: var(--primary); color: white; }
        .sol-btn { background: #95a5a6; color: white; display: none; }
        
        #feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .back-link { display: block; margin-bottom: 20px; text-decoration: none; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <a href="../index.html" class="back-link">← Vissza</a>
    <h2>Finomsági modulus számítása</h2>
    <div class="task-box">
        Számítsd ki az adalékanyag finomsági modulusát (m) az alábbi kumulált (összesített) szitamaradékok alapján!
    </div>

    <table id="sieve-table">
        <tr>
            <th>Szita (mm)</th>
            <td>16</td><td>8</td><td>4</td><td>2</td><td>1</td><td>0.5</td><td>0.25</td>
        </tr>
        <tr id="values-row">
            <th>Maradék (%)</th>
            </tr>
    </table>

    <div class="input-group">
        <label>Finomsági modulus (m):</label>
        <input type="number" id="userAns" step="0.01" placeholder="Pl: 5.42">
    </div>

    <div class="button-group">
        <button onclick="checkAnswer()" class="check-btn">Ellenőrzés</button>
        <button onclick="showSolution()" id="solBtn" class="sol-btn">Megoldás megmutatása</button>
    </div>

    <div id="feedback">
        <div id="status-text"></div>
        <div id="solution-text" style="display:none; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 10px; font-weight: bold;"></div>
    </div>
</div>

<script>
    let residues = [];
    let correctAns;

    function generateTask() {
        const row = document.getElementById('values-row');
        // Töröljük a régi értékeket a fejléc kivételével
        while(row.cells.length > 1) row.deleteCell(1);

        residues = [];
        let sum = 0;
        
        // Generálunk 7 kumulált maradékot (növekvő sorrendben)
        let lastVal = 0;
        for(let i = 0; i < 7; i++) {
            lastVal += Math.floor(Math.random() * 15) + 5;
            if(lastVal > 100) lastVal = 100;
            residues.push(lastVal);
            sum += lastVal;
            
            let cell = row.insertCell(-1);
            cell.innerHTML = lastVal;
        }

        correctAns = (sum / 100).toFixed(2);
        
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('solBtn').style.display = 'none';
        document.getElementById('userAns').value = '';
    }

    function checkAnswer() {
        const userVal = document.getElementById('userAns').value;
        const feedback = document.getElementById('feedback');
        const status = document.getElementById('status-text');
        const solBtn = document.getElementById('solBtn');
        const solText = document.getElementById('solution-text');

        feedback.style.display = 'block';
        solText.style.display = 'none';

        if (Math.abs(userVal - correctAns) <= 0.05) {
            feedback.style.backgroundColor = '#d4edda';
            feedback.style.color = '#155724';
            status.innerHTML = "✅ <b>Helyes!</b> Pontosan számoltál.";
            solBtn.style.display = 'none';
        } else {
            feedback.style.backgroundColor = '#f8d7da';
            feedback.style.color = '#721c24';
            status.innerHTML = "❌ <b>Hibás érték.</b> Összegezd a maradékokat!";
            solBtn.style.display = 'inline-block';
            solText.innerHTML = `Képlet: m = (Σ kumulált maradékok) / 100 <br>
                                Számítás: (${residues.join(' + ')}) / 100 = ${correctAns}`;
        }
    }

    function showSolution() {
        document.getElementById('solution-text').style.display = 'block';
    }

    generateTask();
</script>

</body>
</html>
