<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Beton Gyakorló</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eef2f3; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; }
        input { width: 60px; padding: 5px; }
        button { background: #2c3e50; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Gyakorló feladat</h2>
        <p>Egy terülésmérés során a mért átmérők: $d_1 = 410\text{ mm}$ és $d_2 = 430\text{ mm}$.</p>
        <p>Mekkora a terülési érték ($f$)? <input type="number" id="ans1"> mm</p>
        <button onclick="check()">Ellenőrzés</button>
        <p id="res"></p>
    </div>

    <script>
        function check() {
            let val = document.getElementById('ans1').value;
            if(val == 420) {
                document.getElementById('res').innerHTML = "✅ Helyes! Ez az **F3** terülési osztály.";
            } else {
                document.getElementById('res').innerHTML = "❌ Próbáld újra! Segítség: $(410+430)/2$.";
            }
        }
    </script>
</body>
</html>
