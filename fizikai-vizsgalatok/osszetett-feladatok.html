<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Összetett feladatok</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 600px; width: 100%; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: block; margin-bottom: 20px; }
        .task-box { border-left: 5px solid var(--accent); background: #fcfcfc; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        .btn-check { background: var(--primary); }
        .btn-hint { background: var(--warning); }
        .solution { display: none; background: #fff9e6; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px dashed var(--warning); }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h3>Összetett vizsgálatok</h3>
    <div class="task-box">Egy 5x5x8 cm-es kőhasáb tömege 520g. Valódi sűrűsége 2700 kg/m³.</div>
    <input type="number" id="ans1" placeholder="Testsűrűség [g/cm³]" style="width:100%; padding:10px; margin-bottom:10px;">
    <div class="btn-row">
        <button class="btn-check" onclick="alert('Ellenőrizve!')">Ellenőrzés</button>
        <button class="btn-hint" onclick="document.getElementById('sol').style.display='block'">📚 Megoldás</button>
    </div>
    <div id="sol" class="solution">ρt = 520 / 200 = 2.6 g/cm³<br>Tt = 2.6 / 2.7 = 0.96</div>
</div>
</body>
</html>
