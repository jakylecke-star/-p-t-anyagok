<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Összetett feladatok</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .task-card { background: #fcfcfc; border-left: 5px solid var(--accent); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-check { background: var(--primary); }
        .btn-hint { background: #f39c12; }
        .solution { display: none; background: #fff9e6; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #f39c12; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h2>Összetett feladatok</h2>
    <div class="task-card">Egy 5x5x8 cm-es kőhasáb tömege 520 g. Valódi sűrűsége 2700 kg/m³.</div>
    <label>Testsűrűség [g/cm³]:</label>
    <input type="number" id="a1" step="0.001">
    <label>Tömörség [tizedes]:</label>
    <input type="number" id="a2" step="0.01">
    <div class="btn-row">
        <button class="btn-check" onclick="alert('Ellenőrizve!')">Ellenőrzés</button>
        <button class="btn-hint" onclick="document.getElementById('sol').style.display='block'">Segítség</button>
    </div>
    <div id="sol" class="solution">V = 200 cm³ | ρt = 520/200 = 2,6 g/cm³ | Tt = 2,6 / 2,7 ≈ 0,96</div>
</div>
</body>
</html>
