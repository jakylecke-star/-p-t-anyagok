<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Összetett Építőanyag Vizsgálatok</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .task-box { border-left: 5px solid #3498db; padding-left: 20px; margin-bottom: 25px; background: #f9f9f9; padding: 15px; }
        h2 { color: #2c3e50; margin-top: 0; }
        .input-row { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .check-btn { background: #3498db; color: white; margin-bottom: 10px; }
        .next-btn { background: #2ecc71; color: white; display: none; }
        .feedback { padding: 15px; border-radius: 6px; margin-top: 20px; display: none; line-height: 1.5; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="task-title">Feladat betöltése...</h2>
    <div class="task-box" id="task-description"></div>

    <div id="inputs-container"></div>

    <button class="check-btn" onclick="checkAnswers()">Ellenőrzés</button>
    <button class="next-btn" id="next-btn" onclick="location.reload()">Következő véletlen feladat</button>

    <div id="feedback" class="feedback"></div>
</div>

<script>
    const tasks = [
        {
            title: "Terméskő vizsgálata (Henger/Hasáb)",
            generate: () => {
                const m = (Math.random() * (600 - 500) + 500).toFixed(1);
                const a = 5, b = 5, h = 8;
                const V = a * b * h;
                const rho_valodi = 2700; // kg/m3
                return {
                    text: `Egy szabályos ${a}x${b}x${h} cm-es kőhasáb tömege ${m} g. Az anyag valódi sűrűsége ${rho_valodi} kg/m³.`,
                    questions: [
                        { label: "Testsűrűség (ρt) [g/cm³]:", key: "rhot", ans: m / V, tol: 0.01 },
                        { label: "Tömörség (Tt) [tizedesjegy]:", key: "tt", ans: (m/V) / (rho_valodi/1000), tol: 0.02 }
                    ]
                };
            }
        },
        {
            title: "Égetett agyagtégla porozitása",
            generate: () => {
                const m = (Math.random() * (3500 - 3000) + 3000).toFixed(0);
                const Vt = 1850;
                const rho = 2650;
                const rhot = m / Vt;
                return {
                    text: `A tégla tömege ${m} g, külső térfogata ${Vt} cm³. Az agyag valódi sűrűsége ${rho} kg/m³.`,
                    questions: [
                        { label: "Testsűrűség (ρt) [kg/m³]:", key: "rhot_kg", ans: (m / Vt) * 1000, tol: 10 },
                        { label: "Teljes porozitás (Pt) [%]:", key: "pt", ans: (1 - (rhot / (rho/1000))) * 100, tol: 0.5 }
                    ]
                };
            }
        },
        {
            title: "Könnyűbeton kocka",
            generate: () => {
                const m = (Math.random() * (5 - 4) + 4).toFixed(2);
                const V = 15 * 15 * 15; // 15cm kocka
                return {
                    text: `Egy 15 cm oldalhosszúságú beton kocka tömege ${m} kg.`,
                    questions: [
                        { label: "Testsűrűség (ρt) [kg/m³]:", key: "rhot", ans: (m / V) * 1000000, tol: 20 }
                    ]
                };
            }
        },
        {
            title: "Zúzottkő halmazsűrűség",
            generate: () => {
                const m1 = 5.2;
                const m2 = (Math.random() * (22 - 20) + 20).toFixed(1);
                const V = 10; // liter
                return {
                    text: `A mérőedény tömege ${m1} kg. Zúzottkővel töltve ${m2} kg. Az edény űrtartalma ${V} liter.`,
                    questions: [
                        { label: "Halmazsűrűség (ρh) [kg/m³]:", key: "rhoh", ans: (m2 - m1) / (V / 1000), tol: 5 }
                    ]
                };
            }
        },
        {
            title: "Hőszigetelő anyag (EPS)",
            generate: () => {
                const m = (Math.random() * (0.9 - 0.7) + 0.7).toFixed(2);
                const V = 100 * 50 * 10; // cm3
                const rho = 1050; // kg/m3
                const rhot = (m * 1000) / V;
                return {
                    text: `Egy 100x50x10 cm-es EPS tábla tömege ${m} kg. Az alapanyag sűrűsége ${rho} kg/m³.`,
                    questions: [
                        { label: "Testsűrűség (ρt) [kg/m³]:", key: "rhot", ans: rhot * 1000, tol: 0.5 },
                        { label: "Porozitás (Pt) [%]:", key: "pt", ans: (1 - (rhot / (rho/1000))) * 100, tol: 0.2 }
                    ]
                };
            }
        }
    ];

    // Aktuális feladat kiválasztása
    const currentTaskData = tasks[Math.floor(Math.random() * tasks.length)].generate();
    
    // Felület feltöltése
    document.getElementById('task-title').innerText = tasks.find(t => t.generate().text === currentTaskData.text || true).title; // Egyszerűsített címkeresés
    document.getElementById('task-description').innerHTML = currentTaskData.text;

    const inputContainer = document.getElementById('inputs-container');
    currentTaskData.questions.forEach((q, index) => {
        inputContainer.innerHTML += `
            <div class="input-row">
                <label>${q.label}</label>
                <input type="number" step="0.001" id="ans-${index}">
            </div>
        `;
    });

    function checkAnswers() {
        let allCorrect = true;
        let feedbackText = "";
        
        currentTaskData.questions.forEach((q, index) => {
            const userVal = parseFloat(document.getElementById(`ans-${index}`).value);
            if (Math.abs(userVal - q.ans) > q.tol) {
                allCorrect = false;
                feedbackText += `Hiba a(z) ${index+1}. értéknél! `;
            }
        });

        const fb = document.getElementById('feedback');
        fb.style.display = "block";
        if (allCorrect) {
            fb.className = "feedback success";
            fb.innerHTML = "<b>Gratulálok!</b> Minden számításod pontos.";
            document.getElementById('next-btn').style.display = "block";
        } else {
            fb.className = "feedback error";
            fb.innerHTML = "<b>Valami nem stimmel.</b> " + feedbackText + "<br><small>Ellenőrizd a mértékegységeket és a kerekítést!</small>";
        }
    }
</script>
</body>
</html>
