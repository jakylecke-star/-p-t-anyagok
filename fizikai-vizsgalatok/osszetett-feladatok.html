<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Összetett Vizsgálatok - Megoldással</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 100%; }
        .task-box { border-left: 5px solid #3498db; padding: 15px; margin-bottom: 25px; background: #f9f9f9; }
        .input-row { margin-bottom: 15px; }
        label { display: block; font-size: 0.9em; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .check-btn { background: #3498db; color: white; }
        .hint-btn { background: #f39c12; color: white; }
        .next-btn { background: #2ecc71; color: white; display: none; width: 100%; margin-top: 10px; }
        .feedback { padding: 15px; border-radius: 6px; margin-top: 20px; display: none; }
        .solution-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; margin-top: 20px; display: none; border-radius: 6px; font-size: 0.95em; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="task-title">Feladat</h2>
    <div class="task-box" id="task-description"></div>

    <div id="inputs-container"></div>

    <div class="button-group">
        <button class="check-btn" onclick="checkAnswers()">Ellenőrzés</button>
        <button class="hint-btn" onclick="showSolution()">Megoldás mutatása</button>
    </div>

    <div id="feedback" class="feedback"></div>
    <div id="solution" class="solution-box"></div>
    
    <button class="next-btn" id="next-btn" onclick="location.reload()">Következő feladat</button>
</div>

<script>
    const tasks = [
        {
            title: "Terméskő vizsgálata",
            generate: () => {
                const m = (Math.random() * (600 - 500) + 500).toFixed(1);
                const V = 5 * 5 * 8; // 200 cm3
                const rho_v = 2700;
                const rhot = m / V;
                const tt = rhot / (rho_v / 1000);
                return {
                    text: `A kőhasáb (5x5x8 cm) tömege ${m} g. Valódi sűrűsége ${rho_v} kg/m³.`,
                    steps: `1. Térfogat: 5 * 5 * 8 = 200 cm³<br>2. ρt = ${m} / 200 = ${rhot.toFixed(3)} g/cm³<br>3. Tt = ${rhot.toFixed(3)} / 2.7 = ${tt.toFixed(2)}`,
                    questions: [{ ans: rhot, tol: 0.01 }, { ans: tt, tol: 0.02 }],
                    labels: ["Testsűrűség (ρt) [g/cm³]", "Tömörség (Tt) [tizedes]"]
                };
            }
        },
        {
            title: "Agyagtégla porozitása",
            generate: () => {
                const m = (Math.random() * (3500 - 3000) + 3000).toFixed(0);
                const Vt = 1850;
                const rho = 2650;
                const rhot_kg = (m / Vt) * 1000;
                const pt = (1 - (rhot_kg / rho)) * 100;
                return {
                    text: `A tégla tömege ${m} g, külső térfogata ${Vt} cm³. Valódi sűrűsége ${rho} kg/m³.`,
                    steps: `1. ρt = (${m} / ${Vt}) * 1000 = ${rhot_kg.toFixed(0)} kg/m³<br>2. Pt = (1 - ${rhot_kg.toFixed(0)} / ${rho}) * 100 = ${pt.toFixed(2)}%`,
                    questions: [{ ans: rhot_kg, tol: 10 }, { ans: pt, tol: 0.5 }],
                    labels: ["Testsűrűség [kg/m³]", "Porozitás [%]"]
                };
            }
        }
        // Itt a többi feladatot is hasonlóan bővíthetjük...
    ];

    const currentTask = tasks[Math.floor(Math.random() * tasks.length)].generate();
    document.getElementById('task-title').innerText = currentTask.title;
    document.getElementById('task-description').innerHTML = currentTask.text;

    const inputContainer = document.getElementById('inputs-container');
    currentTask.questions.forEach((q, i) => {
        inputContainer.innerHTML += `<div class="input-row"><label>${currentTask.labels[i]}</label><input type="number" id="ans-${i}"></div>`;
    });

    function checkAnswers() {
        let ok = true;
        currentTask.questions.forEach((q, i) => {
            const val = parseFloat(document.getElementById(`ans-${i}`).value);
            if (Math.abs(val - q.ans) > q.tol) ok = false;
        });
        const fb = document.getElementById('feedback');
        fb.style.display = "block";
        fb.className = ok ? "feedback success" : "feedback error";
        fb.innerHTML = ok ? "🎉 Helyes megoldás!" : "❌ Valami nem jó, próbáld újra vagy nézd meg a levezetést!";
        if(ok) document.getElementById('next-btn').style.display = "block";
    }

    function showSolution() {
        const sol = document.getElementById('solution');
        sol.style.display = "block";
        sol.innerHTML = "<strong>Megoldás menete:</strong><br>" + currentTask.steps;
    }
</script>
</body>
</html>
