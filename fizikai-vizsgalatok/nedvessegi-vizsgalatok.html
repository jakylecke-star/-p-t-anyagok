<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Nedvesség gyakorló</title>
    <style>
        :root { --primary: #2c3e50; --accent: #9b59b6; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; max-width: 500px; width: 100%; }
        .back-link { text-decoration: none; color: var(--accent); font-weight: bold; display: inline-block; margin-bottom: 20px; }
        .task-card { background: #fcfcfc; border-left: 5px solid var(--accent); padding: 20px; border-radius: 8px; margin-bottom: 20px; line-height: 1.6; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <a href="../index.html" class="back-link">← Vissza a főmenübe</a>
    <h3>Nedvességi vizsgálatok</h3>
    <div id="task" class="task-card">Betöltés...</div>
    <label>Víztartalom (w) [%]:</label>
    <input type="number" id="userAns" step="0.001">
    <button onclick="check()">Ellenőrzés</button>
</div>
<script>
    let correct;
    function generate() {
        let msz = Math.floor(Math.random() * 2000) + 18500;
        let diff = Math.floor(Math.random() * 400) + 400;
        let mn = msz + diff;
        correct = (diff / msz * 100).toFixed(3);
        document.getElementById('task').innerHTML = `Egy minta száraz tömege <b>${msz} g</b>, nedves tömege pedig <b>${mn} g</b>. Számítsd ki a víztartalmat!`;
    }
    function check() {
        let val = document.getElementById('userAns').value;
        if(Math.abs(val - correct) < 0.05) {
            alert("✅ Helyes válasz!");
            location.reload();
        } else {
            alert("❌ Próbáld újra! Segítség: (Nedves-Száraz)/Száraz * 100");
        }
    }
    generate();
</script>
</body>
</html>
