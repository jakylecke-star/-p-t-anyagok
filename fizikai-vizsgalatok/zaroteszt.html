    // Kiválasztunk pontosan 40 véletlenszerűt
    activeQuestions = shuffled.slice(0, NUM_QUESTIONS);
    
    document.getElementById('quiz-header').innerHTML = `Záróvizsga: ${activeQuestions.length} kérdés a tananyagból`;
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';

    activeQuestions.forEach((q, i) => {
        let html = `<div class="question-card"><h3>${i+1}. ${q.q}</h3><div class="options">`;
        
        if(q.type === 'single') {
            q.options.forEach((opt, oi) => {
                html += `<label><input type="radio" name="q${i}" value="${oi}"> ${opt}</label>`;
            });
        } else if(q.type === 'multiple') {
            q.options.forEach((opt, oi) => {
                html += `<label><input type="checkbox" name="q${i}" value="${oi}"> ${opt}</label>`;
            });
        } else if(q.type === 'order') {
            html += `<p style="font-size:0.8rem; color:gray;">Írd be a helyes sorrend számait (pl. 1234):</p>`;
            html += `<input type="text" id="q${i}" class="order-input" placeholder="1234">`;
            html += `<ul>${q.options.map((o, idx) => `<li>${idx+1}. ${o}</li>`).join('')}</ul>`;
        }
        
        html += `</div></div>`;
        container.innerHTML += html;
    });
}

function evaluateQuiz() {
    let score = 0;
    activeQuestions.forEach((q, i) => {
        if(q.type === 'single') {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            if(sel && parseInt(sel.value) === q.correct) score++;
        } else if(q.type === 'multiple') {
            const sel = Array.from(document.querySelectorAll(`input[name="q${i}"]:checked`)).map(el => parseInt(el.value));
            if(JSON.stringify(sel.sort()) === JSON.stringify(q.correct.sort())) score++;
        } else if(q.type === 'order') {
            const inputVal = document.getElementById(`q${i}`).value.trim();
            const val = inputVal.split('').map(n => parseInt(n)-1);
            if(JSON.stringify(val) === JSON.stringify(q.correct)) score++;
        }
    });

    const percent = (score / activeQuestions.length) * 100;
    const isPassed = percent >= 40;
    
    alert(`EREDMÉNY:\nPontszám: ${score} / ${activeQuestions.length}\nSzázalék: ${percent.toFixed(1)}%\nStátusz: ${isPassed ? "SIKERES ✅" : "SIKERTELEN ❌ (Limit: 40%)"}`);
    
    if(confirm("Szeretnél új vizsgát indítani más kérdésekkel?")) {
        location.reload();
    }
}

initQuiz();
</script>

</html>
